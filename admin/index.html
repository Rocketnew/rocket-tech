<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rupeewa Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ===== ROOT VARIABLES (matching main site) ===== */
:root {
  --bg: #050508;
  --bg-surface: #0a0a14;
  --bg-card: #0f0f1e;
  --bg-card-hover: #14142a;
  --text: #e8e8f0;
  --text-secondary: #9494b8;
  --text-muted: #6c6c90;
  --border: rgba(255,255,255,0.04);
  --border-hover: rgba(255,255,255,0.1);
  --radius: 14px;
  --radius-sm: 8px;
  --radius-lg: 20px;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.4);
  --shadow: 0 4px 20px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.03);
  --shadow-lg: 0 20px 60px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.05);
  --ease: cubic-bezier(.16,1,.3,1);
  --accent: #7c3aed;
  --accent-gradient: linear-gradient(135deg, #7c3aed, #6366f1);
  --sidebar-width: 250px;
  font-feature-settings: 'cv02','cv05','cv07','cv10','cv11','tnum';
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html {
  scroll-behavior: smooth;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
}

a { color: #8b83ff; text-decoration: none; }
a:hover { color: #a99eff; }

/* ===== LOGIN PAGE ===== */
.login-page {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 2rem;
  background: var(--bg);
  position: relative;
  overflow: hidden;
}

.login-page::before {
  content: '';
  position: absolute;
  inset: 0;
  background: 
    radial-gradient(circle at 20% 30%, rgba(124,58,237,0.08) 0%, transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(99,102,241,0.06) 0%, transparent 50%);
  pointer-events: none;
}

.login-box {
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  padding: 3rem;
  width: 100%;
  max-width: 420px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow-lg);
  position: relative;
  backdrop-filter: blur(20px);
}

.login-box::before {
  content: '';
  position: absolute;
  top: -1px;
  left: 20%;
  right: 20%;
  height: 2px;
  background: var(--accent-gradient);
  border-radius: 2px;
}

.login-logo {
  text-align: center;
  margin-bottom: 2rem;
}

.login-logo .logo-icon {
  font-size: 2.5rem;
  display: block;
  margin-bottom: 0.5rem;
}

.login-logo h1 {
  font-size: 1.6rem;
  font-weight: 700;
  letter-spacing: -0.03em;
}

.login-logo h1 span {
  background: var(--accent-gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.login-logo p {
  color: var(--text-muted);
  font-size: 0.9rem;
  margin-top: 0.25rem;
}

.login-box .form-group {
  margin-bottom: 1.25rem;
}

.login-box label {
  display: block;
  font-size: 0.8rem;
  color: var(--text-secondary);
  margin-bottom: 0.4rem;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.login-box input {
  width: 100%;
  padding: 0.85rem 1rem;
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 0.95rem;
  font-family: var(--font);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.login-box input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(124,58,237,0.12);
}

.login-box input::placeholder {
  color: var(--text-muted);
}

.login-box .login-btn {
  width: 100%;
  padding: 0.85rem;
  background: var(--accent-gradient);
  border: none;
  border-radius: var(--radius-sm);
  color: #fff;
  font-size: 1rem;
  font-weight: 600;
  font-family: var(--font);
  cursor: pointer;
  transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 16px rgba(124,58,237,0.25);
  letter-spacing: 0.2px;
}

.login-box .login-btn:hover {
  opacity: 0.92;
  transform: translateY(-1px);
  box-shadow: 0 6px 24px rgba(124,58,237,0.35);
}

.login-box .login-btn:active {
  transform: translateY(0);
}

.login-box .login-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}

.login-error {
  color: #f87171;
  font-size: 0.85rem;
  margin-top: 0.75rem;
  text-align: center;
  min-height: 1.5rem;
}

/* ===== APP LAYOUT ===== */
.app-container {
  display: flex;
  min-height: 100vh;
}

/* Sidebar */
.sidebar {
  width: var(--sidebar-width);
  background: var(--bg-surface);
  border-right: 1px solid var(--border);
  padding: 1.5rem;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0;
  left: 0;
  bottom: 0;
  z-index: 100;
  overflow-y: auto;
}

.sidebar-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 2rem;
  padding-bottom: 1rem;
  border-bottom: 1px solid var(--border);
}

.sidebar-brand .brand-icon {
  font-size: 1.6rem;
}

.sidebar-brand .brand-text {
  font-size: 1.1rem;
  font-weight: 700;
}

.sidebar-brand .brand-text span {
  background: var(--accent-gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.sidebar-user {
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-top: -1rem;
  margin-bottom: 1.5rem;
  padding-left: 0.25rem;
}

.sidebar nav {
  display: flex;
  flex-direction: column;
  gap: 2px;
  flex: 1;
}

.sidebar nav a {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0.7rem 0.9rem;
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  font-size: 0.88rem;
  font-weight: 500;
  transition: all 0.15s var(--ease);
  text-decoration: none;
}

.sidebar nav a:hover {
  background: rgba(255,255,255,0.03);
  color: var(--text);
}

.sidebar nav a.active {
  background: rgba(124,58,237,0.1);
  color: #a78bfa;
  font-weight: 600;
}

.sidebar nav a .nav-icon {
  font-size: 1.1rem;
  width: 24px;
  text-align: center;
  flex-shrink: 0;
}

.sidebar .sidebar-footer {
  margin-top: auto;
  padding-top: 1rem;
  border-top: 1px solid var(--border);
}

.sidebar .logout-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0.7rem 0.9rem;
  border-radius: var(--radius-sm);
  color: var(--text-muted);
  font-size: 0.85rem;
  font-family: var(--font);
  cursor: pointer;
  border: none;
  background: none;
  text-align: left;
  width: 100%;
  transition: all 0.15s var(--ease);
}

.sidebar .logout-btn:hover {
  color: #f87171;
  background: rgba(248,113,113,0.06);
}

/* Main content area */
.main-content {
  flex: 1;
  margin-left: var(--sidebar-width);
  padding: 2rem 2.5rem;
  min-height: 100vh;
  max-width: 1200px;
}

/* ===== PAGE HEADERS ===== */
.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 2rem;
  flex-wrap: wrap;
  gap: 1rem;
}

.page-header h1 {
  font-size: 1.65rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.page-header .subtitle {
  color: var(--text-muted);
  font-size: 0.9rem;
  margin-top: 0.15rem;
}

.page-actions {
  display: flex;
  gap: 0.6rem;
  flex-wrap: wrap;
}

/* ===== STATS GRID ===== */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 1rem;
  margin-bottom: 2rem;
}

.stat-card {
  position: relative;
  overflow: hidden;
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 1.4rem 1.5rem;
  border: 1px solid var(--border);
  transition: transform 0.25s var(--ease), box-shadow 0.25s ease, border-color 0.25s ease;
}

.stat-card:hover {
  transform: translateY(-3px);
  border-color: var(--border-hover);
  box-shadow: var(--shadow);
}

.stat-card .stat-icon {
  font-size: 1.6rem;
  margin-bottom: 0.5rem;
  display: inline-block;
}

.stat-card .stat-content {
  position: relative;
  z-index: 1;
}

.stat-card .label {
  font-size: 0.7rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  font-weight: 600;
}

.stat-card .value {
  font-size: 1.8rem;
  font-weight: 700;
  margin-top: 0.15rem;
  background: linear-gradient(135deg, var(--text), #a5a5b8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1.2;
}

.stat-card .stat-sub {
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-top: 0.3rem;
  display: flex;
  align-items: center;
  gap: 0.3rem;
}

.stat-card .stat-sub.up { color: #6ee7b7; }
.stat-card .stat-sub.down { color: #fca5a5; }
.stat-card .stat-sub.neutral { color: var(--text-muted); }

/* Per-card accent glow */
.stat-card::after {
  content: '';
  position: absolute;
  top: -50%;
  right: -50%;
  width: 100%;
  height: 100%;
  border-radius: 50%;
  opacity: 0.04;
  pointer-events: none;
  transition: opacity 0.3s;
}

.stat-card:hover::after { opacity: 0.08; }

.stat-accent-purple::after { background: radial-gradient(circle, var(--accent), transparent); }
.stat-accent-green::after { background: radial-gradient(circle, #059669, transparent); }
.stat-accent-blue::after { background: radial-gradient(circle, #3b82f6, transparent); }
.stat-accent-amber::after { background: radial-gradient(circle, #f59e0b, transparent); }
.stat-accent-rose::after { background: radial-gradient(circle, #ec4899, transparent); }
.stat-accent-cyan::after { background: radial-gradient(circle, #06b6d4, transparent); }
.stat-accent-orange::after { background: radial-gradient(circle, #f97316, transparent); }

/* ===== CARDS ===== */
.card {
  background: var(--bg-card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 1.5rem;
  margin-bottom: 1rem;
  transition: border-color 0.2s;
}

.card:hover {
  border-color: var(--border-hover);
}

.card h3 {
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 1rem;
  display: flex;
  align-items: center;
  gap: 0.4rem;
  color: var(--text);
}

.card p.subtle {
  color: var(--text-muted);
  font-size: 0.85rem;
}

/* ===== TABLES ===== */
.table-wrap {
  overflow-x: auto;
  border-radius: var(--radius-sm);
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.88rem;
}

th {
  text-align: left;
  padding: 0.7rem 0.6rem;
  color: var(--text-muted);
  font-weight: 500;
  border-bottom: 1px solid var(--border);
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.4px;
}

td {
  padding: 0.7rem 0.6rem;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  transition: background 0.15s;
}

tr:hover td {
  background: rgba(124,58,237,0.02);
}

/* ===== FORMS ===== */
input, select, textarea {
  width: 100%;
  padding: 0.7rem 0.9rem;
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 0.9rem;
  font-family: var(--font);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

input:focus, select:focus, textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(124,58,237,0.1);
}

textarea {
  min-height: 80px;
  resize: vertical;
  line-height: 1.5;
}

label {
  display: block;
  font-size: 0.82rem;
  color: var(--text-secondary);
  margin-bottom: 0.35rem;
  font-weight: 500;
}

.form-row {
  margin-bottom: 1rem;
}

.form-row.inline {
  display: flex;
  align-items: center;
  gap: 0.75rem;
}

.form-row.inline label {
  margin-bottom: 0;
  flex-shrink: 0;
}

.form-row.inline input[type="checkbox"] {
  width: auto;
}

.form-hint {
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-top: 0.25rem;
}

.char-count {
  font-size: 0.72rem;
  color: var(--text-muted);
  text-align: right;
  margin-top: 0.2rem;
}

/* ===== BUTTONS ===== */
.btn {
  padding: 0.6rem 1.2rem;
  border-radius: var(--radius-sm);
  border: none;
  font-size: 0.85rem;
  font-weight: 600;
  font-family: var(--font);
  cursor: pointer;
  transition: all 0.2s var(--ease);
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  letter-spacing: 0.2px;
}

.btn-primary {
  background: var(--accent-gradient);
  color: #fff;
  box-shadow: 0 2px 10px rgba(124,58,237,0.2);
}

.btn-primary:hover {
  opacity: 0.92;
  box-shadow: 0 4px 16px rgba(124,58,237,0.35);
  transform: translateY(-1px);
}

.btn-primary:active {
  transform: translateY(0);
}

.btn-primary:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

.btn-danger {
  background: #dc2626;
  color: #fff;
}

.btn-danger:hover {
  background: #b91c1c;
  transform: translateY(-1px);
}

.btn-sm {
  padding: 0.35rem 0.75rem;
  font-size: 0.78rem;
}

.btn-outline {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.08);
  color: var(--text-secondary);
}

.btn-outline:hover {
  border-color: var(--accent);
  color: var(--text);
  background: rgba(124,58,237,0.05);
}

.btn-success {
  background: #059669;
  color: #fff;
}

.btn-success:hover {
  background: #047857;
  transform: translateY(-1px);
}

.btn-ghost {
  background: transparent;
  color: var(--text-muted);
  padding: 0.4rem 0.6rem;
}

.btn-ghost:hover {
  color: var(--text);
  background: rgba(255,255,255,0.03);
}

/* ===== BADGES ===== */
.badge {
  display: inline-block;
  padding: 0.15rem 0.5rem;
  border-radius: 4px;
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.2px;
}

.badge-green { background: rgba(6,95,70,0.4); color: #6ee7b7; }
.badge-red { background: rgba(127,29,29,0.4); color: #fca5a5; }
.badge-yellow { background: rgba(113,63,18,0.4); color: #fcd34d; }
.badge-blue { background: rgba(30,58,95,0.4); color: #93c5fd; }
.badge-purple { background: rgba(91,33,182,0.4); color: #c4b5fd; }
.badge-gray { background: rgba(75,75,90,0.3); color: var(--text-muted); }

/* ===== TOAST ===== */
.toast-container {
  position: fixed;
  bottom: 2rem;
  right: 2rem;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}

.toast {
  background: var(--bg-card);
  border: 1px solid var(--border-hover);
  border-radius: var(--radius-sm);
  padding: 0.85rem 1.2rem;
  color: var(--text);
  font-size: 0.88rem;
  box-shadow: var(--shadow-lg);
  animation: toastSlideIn 0.3s var(--ease);
  display: flex;
  align-items: center;
  gap: 0.5rem;
  max-width: 400px;
  backdrop-filter: blur(12px);
}

.toast.toast-error {
  border-color: rgba(248,113,113,0.3);
}

.toast.toast-success {
  border-color: rgba(110,231,183,0.3);
}

@keyframes toastSlideIn {
  from { transform: translateY(1rem) scale(0.96); opacity: 0; }
  to { transform: translateY(0) scale(1); opacity: 1; }
}

@keyframes toastSlideOut {
  from { transform: translateY(0) scale(1); opacity: 1; }
  to { transform: translateY(1rem) scale(0.96); opacity: 0; }
}

/* ===== UTILITY ===== */
.hidden { display: none !important; }
.loading {
  text-align: center;
  padding: 3rem;
  color: var(--text-muted);
  font-size: 0.9rem;
}

.loading-spinner {
  display: inline-block;
  width: 24px;
  height: 24px;
  border: 2px solid rgba(255,255,255,0.06);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin-right: 0.5rem;
  vertical-align: middle;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.flex { display: flex; gap: 0.75rem; align-items: center; }
.flex-wrap { flex-wrap: wrap; }
.flex-1 { flex: 1; }
.mt-1 { margin-top: 1rem; }
.mb-1 { margin-bottom: 1rem; }
.mr-1 { margin-right: 0.5rem; }
.text-center { text-align: center; }
.color-success { color: #6ee7b7; }
.color-danger { color: #fca5a5; }
.color-muted { color: var(--text-muted); }
.truncate { 
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.gap-1 { gap: 0.5rem; }

/* Article form */
.create-form { max-width: 640px; }
.image-preview-container {
  margin-top: 0.5rem;
  display: none;
}
.image-preview-container.show {
  display: block;
}
.image-preview-container img {
  max-width: 100%;
  max-height: 200px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
}

/* Build page */
.build-cta {
  text-align: center;
  padding: 2.5rem;
}
.build-cta .btn-large {
  font-size: 1.1rem;
  padding: 1rem 2.5rem;
  border-radius: var(--radius);
}
.build-output {
  background: rgba(0,0,0,0.4);
  padding: 1rem;
  border-radius: var(--radius-sm);
  font-size: 0.8rem;
  font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
  max-height: 300px;
  overflow: auto;
  white-space: pre-wrap;
  line-height: 1.5;
  border: 1px solid var(--border);
  color: var(--text-secondary);
}

/* Divider */
hr {
  border: none;
  border-top: 1px solid var(--border);
  margin: 1.5rem 0;
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 3rem;
  color: var(--text-muted);
}

.empty-state .empty-icon {
  font-size: 3rem;
  margin-bottom: 1rem;
  opacity: 0.5;
}

.empty-state p {
  font-size: 0.95rem;
}

/* ===== MOBILE RESPONSIVE ===== */
@media (max-width: 768px) {
  .sidebar {
    width: 100%;
    position: relative;
    height: auto;
    border-right: none;
    border-bottom: 1px solid var(--border);
    padding: 1rem;
  }

  .sidebar-brand {
    margin-bottom: 1rem;
    padding-bottom: 0.75rem;
  }

  .sidebar nav {
    display: none;
  }

  .sidebar.mobile-open nav {
    display: flex;
  }

  .sidebar .sidebar-footer {
    display: none;
  }

  .sidebar.mobile-open .sidebar-footer {
    display: block;
  }

  .sidebar-toggle {
    display: flex !important;
  }

  .main-content {
    margin-left: 0;
    padding: 1.25rem;
  }

  .stats-grid {
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 0.75rem;
  }

  .stat-card {
    padding: 1rem;
  }

  .stat-card .value {
    font-size: 1.4rem;
  }

  .page-header {
    flex-direction: column;
    align-items: flex-start;
  }

  .page-actions {
    width: 100%;
  }

  .page-actions .btn {
    flex: 1;
    justify-content: center;
  }

  .login-box {
    padding: 2rem 1.5rem;
  }

  .toast-container {
    left: 1rem;
    right: 1rem;
    bottom: 1rem;
  }

  .toast {
    max-width: 100%;
  }
}

/* Sidebar toggle button (hidden on desktop) */
.sidebar-toggle {
  display: none;
  background: none;

@media (max-width: 768px) {

</head>
<body>

<!-- ===== LOGIN PAGE ===== -->
<div id="loginPage" class="login-page">
  <div class="login-box">
    <div class="login-logo">
      <span class="logo-icon">🚀</span>
      <h1><span>Rupeewa</span> Admin</h1>
      <p>Sign in to manage your news site</p>
    </div>
    <div class="form-group">
      <label for="loginUser">Username</label>
      <input type="text" id="loginUser" placeholder="Enter username" autocomplete="username">
    </div>
    <div class="form-group">
      <label for="loginPass">Password</label>
      <input type="password" id="loginPass" placeholder="Enter password" autocomplete="current-password">
    </div>
    <button class="login-btn" id="loginBtn" onclick="login()">Sign In</button>
    <div id="loginError" class="login-error"></div>
  </div>
</div>

<!-- ===== MOBILE HEADER ===== -->
<div class="mobile-header" id="mobileHeader">
  <button class="mobile-menu-btn" onclick="toggleMobileSidebar()" aria-label="Toggle menu">☰</button>
  <span class="mobile-brand"><span>Rupeewa</span> Admin</span>
  <span style="color:var(--text-muted);font-size:0.8rem" id="mobileUserBadge"></span>
</div>

<!-- ===== SIDEBAR OVERLAY ===== -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeMobileSidebar()"></div>

<!-- ===== APP CONTAINER ===== -->
<div id="appContainer" class="app-container hidden">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-close">
      <button onclick="closeMobileSidebar()">✕</button>
    </div>
    <div class="sidebar-brand">
      <span class="brand-icon">🚀</span>
      <span class="brand-text"><span>Rupeewa</span> Admin</span>
    </div>
    <div class="sidebar-user" id="sidebarUser">Signed in as <strong id="userBadge">—</strong></div>
    <nav>
      <a href="#" data-page="dashboard" class="active" onclick="navigate('dashboard')">
        <span class="nav-icon">📊</span> Dashboard
      </a>
      <a href="#" data-page="articles" onclick="navigate('articles')">
        <span class="nav-icon">📝</span> Articles
      </a>
      <a href="#" data-page="createarticle" onclick="navigate('createarticle')">
        <span class="nav-icon">✏️</span> New Article
      </a>
      <a href="#" data-page="settings" onclick="navigate('settings')">
        <span class="nav-icon">⚙️</span> Site Settings
      </a>
      <a href="#" data-page="build" onclick="navigate('build')">
        <span class="nav-icon">🚀</span> Build
      </a>
      <a href="#" data-page="subscribers" onclick="navigate('subscribers')">
        <span class="nav-icon">📧</span> Subscribers
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="logout-btn" onclick="logout()">
        <span style="font-size:1.1rem">🚪</span> Sign Out
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content" id="mainContent">
    <div id="pageContent">
      <div class="loading"><span class="loading-spinner"></span> Loading...</div>
    </div>
  </main>
</div>

<!-- ===== TOAST CONTAINER ===== -->
<div class="toast-container" id="toastContainer"></div>

<script>
/* ===== STATE ===== */
let token = sessionStorage.getItem('admin_token') || '';
let username = sessionStorage.getItem('admin_user') || '';
let currentPage = 'dashboard';

/* ===== API HELPER ===== */
async function api(method, path, body, opts = {}) {
  const headers = {};
  if (token) headers['Authorization'] = `Bearer ${token}`;

  let bodyStr = null;
  if (body instanceof FormData) {
    bodyStr = body;
  } else if (body !== undefined && body !== null) {
    headers['Content-Type'] = 'application/json';
    bodyStr = JSON.stringify(body);
  }

  try {
    const res = await fetch('/api' + path, {
      method,
      headers,
      body: bodyStr
    });

    if (res.status === 401) {
      token = '';
      sessionStorage.removeItem('admin_token');
      sessionStorage.removeItem('admin_user');
      showLogin();
      return null;
    }

    const data = await res.json();
    if (!res.ok) {
      const errMsg = data.detail || data.error || data.message || `Request failed (${res.status})`;
      if (!opts.silent) toast(errMsg, 'error');
      return null;
    }
    return data;
  } catch (e) {
    if (!opts.silent) toast('Network error: ' + e.message, 'error');
    return null;
  }
}

/* ===== SANITIZATION ===== */
function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function escAttr(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

/* ===== TOAST ===== */
function toast(msg, type = 'info') {
  const container = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = 'toast' + (type === 'error' ? ' toast-error' : type === 'success' ? ' toast-success' : '');
  const icon = type === 'error' ? '❌' : type === 'success' ? '✅' : 'ℹ️';
  el.innerHTML = `<span>${icon}</span><span>${escHtml(msg)}</span>`;
  container.appendChild(el);
  setTimeout(() => {
    el.style.animation = 'toastSlideOut 0.3s var(--ease) forwards';
    setTimeout(() => el.remove(), 300);
  }, 3000);
}

/* ===== LOGIN / LOGOUT ===== */
function showLogin() {
  document.getElementById('loginPage').classList.remove('hidden');
  document.getElementById('appContainer').classList.add('hidden');
  document.getElementById('mobileHeader').classList.add('hidden');
}

function showApp() {
  document.getElementById('loginPage').classList.add('hidden');
  document.getElementById('appContainer').classList.remove('hidden');
  document.getElementById('mobileHeader').classList.remove('hidden');
  document.getElementById('mobileUserBadge').textContent = username;
}

async function login() {
  const user = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value;
  const btn = document.getElementById('loginBtn');
  const errEl = document.getElementById('loginError');

  if (!user || !pass) { errEl.textContent = 'Please enter username and password'; return; }
  errEl.textContent = '';
  btn.disabled = true;
  btn.textContent = 'Signing in...';

  try {
    // Send as JSON to match the Vercel API server
    const body = JSON.stringify({ username: user, password: pass });
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: body
    });

    const data = await res.json();

    if (res.ok && data.access_token) {
      token = data.access_token;
      username = data.username || user;
      sessionStorage.setItem('admin_token', token);
      sessionStorage.setItem('admin_user', username);
      document.getElementById('userBadge').textContent = username;
      showApp();
      navigate('dashboard');
      toast('Welcome back, ' + username + '!', 'success');
    } else {
      errEl.textContent = data.error || data.detail || 'Invalid credentials';
    }
  } catch (e) {
    errEl.textContent = 'Connection error: ' + e.message;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}

function logout() {
  token = '';
  username = '';
  sessionStorage.removeItem('admin_token');
  sessionStorage.removeItem('admin_user');
  closeMobileSidebar();
  showLogin();
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
}

/* ===== NAVIGATION ===== */
function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.sidebar nav a').forEach(a => {
    a.classList.toggle('active', a.dataset.page === page);
  });
  closeMobileSidebar();
  loadPage(page);
}

function loadPage(page) {
  const el = document.getElementById('pageContent');
  el.innerHTML = '<div class="loading"><span class="loading-spinner"></span> Loading...</div>';
  switch (page) {
    case 'dashboard': loadDashboard(el); break;
    case 'articles': loadArticles(el); break;
    case 'createarticle': loadCreateArticle(el); break;
    case 'settings': loadSettings(el); break;
    case 'build': loadBuild(el); break;
    case 'subscribers': loadSubscribers(el); break;
    default: loadDashboard(el);
  }
}

/* ===== MOBILE SIDEBAR ===== */
function toggleMobileSidebar() {
  document.getElementById('sidebar').classList.toggle('mobile-open');
  document.getElementById('sidebarOverlay').classList.toggle('show');
}

function closeMobileSidebar() {
  document.getElementById('sidebar').classList.remove('mobile-open');
  document.getElementById('sidebarOverlay').classList.remove('show');
}

/* ====== DASHBOARD ====== */
async function loadDashboard(el) {
  const data = await api('GET', '/dashboard');
  if (!data) {
    el.innerHTML = '<div class="card"><p style="color:var(--color-danger)">❌ Failed to load dashboard data. Check your connection.</p></div>';
    return;
  }

  const now = new Date();
  const hour = now.getHours();
  const greeting = hour < 12 ? 'Good Morning' : hour < 17 ? 'Good Afternoon' : 'Good Evening';

  el.innerHTML = `
    <div class="page-header">
      <div>
        <h1>📊 Dashboard</h1>
        <div class="subtitle">${greeting}, ${escHtml(username)} · ${now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' })}</div>
      </div>
      <div class="page-actions">
        <button class="btn btn-primary" onclick="navigate('build')">🚀 Trigger Build</button>
        <button class="btn btn-outline" onclick="window.open('https://rupeewa.vercel.app', '_blank')">🌐 View Site</button>
      </div>
    </div>
    <div class="stats-grid">
      <div class="stat-card stat-accent-purple">
        <div class="stat-content">
          <div class="stat-icon">📰</div>
          <div class="label">Total Articles</div>
          <div class="value">${data.article_count || 0}</div>
          <div class="stat-sub neutral">📦 ${data.db_articles || 0} in database</div>
        </div>
      </div>
      <div class="stat-card stat-accent-cyan">
        <div class="stat-content">
          <div class="stat-icon">📡</div>
          <div class="label">Sources</div>
          <div class="value">${data.source_count || 0}</div>
          <div class="stat-sub ${data.sources > 0 ? 'up' : 'neutral'}">${data.sources > 0 ? '📡 ' + data.sources + ' total configured' : '⚙️ Add sources to get started'}</div>
        </div>
      </div>
      <div class="stat-card stat-accent-amber">
        <div class="stat-content">
          <div class="stat-icon">💾</div>
          <div class="label">Site Size</div>
          <div class="value">${(data.index_size / 1024).toFixed(0)} <span style="font-size:1rem;-webkit-text-fill-color:var(--text-muted)">KB</span></div>
          <div class="stat-sub neutral">📄 Generated from build</div>
        </div>
      </div>
      <div class="stat-card stat-accent-green">
        <div class="stat-content">
          <div class="stat-icon">📧</div>
          <div class="label">Subscribers</div>
          <div class="value">${data.subscribers || 0}</div>
          <div class="stat-sub ${data.subscribers > 0 ? 'up' : 'neutral'}">${data.subscribers > 0 ? '👥 Newsletter subscribers' : '⏳ No subscribers yet'}</div>
        </div>
      </div>
      <div class="stat-card stat-accent-rose">
        <div class="stat-content">
          <div class="stat-icon">👁️</div>
          <div class="label">Visits (7 days)</div>
          <div class="value">${data.visits_7d || 0}</div>
          <div class="stat-sub neutral">📊 Page views this week</div>
        </div>
      </div>
      <div class="stat-card stat-accent-blue">
        <div class="stat-content">
          <div class="stat-icon">⏱️</div>
          <div class="label">Last Build</div>
          <div class="value" style="font-size:1.2rem;background:none;-webkit-text-fill-color:var(--text)">${data.last_build !== 'Never' && data.last_build ? new Date(data.last_build).toLocaleDateString() : 'Never'}</div>
          <div class="stat-sub neutral">${data.last_build !== 'Never' && data.last_build ? '🕐 ' + new Date(data.last_build).toLocaleTimeString() : 'Build today to publish'}</div>
        </div>
      </div>
    </div>
    ${data.recent_builds && data.recent_builds.length ? `
    <div class="card">
      <h3>📋 Recent Builds</h3>
      <div class="table-wrap"><table>
        <tr><th>Time</th><th>Status</th><th>Articles</th></tr>
        ${data.recent_builds.slice(0, 5).map(b => `
          <tr>
            <td style="font-size:0.82rem">${b.started ? new Date(b.started).toLocaleString() : '-'}</td>
            <td><span class="badge ${b.status === 'success' ? 'badge-green' : b.status === 'failed' ? 'badge-red' : 'badge-yellow'}">${b.status || 'unknown'}</span></td>
            <td>${b.articles || 0}</td>
          </tr>
        `).join('')}
      </table></div>
    </div>` : ''}
  `;
}

/* ====== ARTICLES ====== */
async function loadArticles(el) {
  const data = await api('GET', '/articles?limit=200');
  if (!data) {
    el.innerHTML = '<div class="card"><p style="color:var(--color-danger)">❌ Failed to load articles</p></div>';
    return;
  }

  el.innerHTML = `
    <div class="page-header">
      <div>
        <h1>📝 Articles</h1>
        <div class="subtitle">${data.total} articles from latest build</div>
      </div>
      <div class="page-actions">
        <button class="btn btn-primary" onclick="navigate('createarticle')">✏️ New Article</button>
        <button class="btn btn-outline" onclick="loadArticles(document.getElementById('pageContent'))">🔄 Refresh</button>
      </div>
    </div>
    <div class="card">
      ${data.articles && data.articles.length ? `
      <div class="table-wrap"><table>
        <tr><th>Title</th><th>Source</th><th>Featured</th><th>Hidden</th><th>Actions</th></tr>
        ${data.articles.map((a, i) => `
          <tr>
            <td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
              <a href="${escAttr(a.url)}" target="_blank" title="${escAttr(a.title)}">${escHtml(a.title ? a.title.substring(0, 60) : '(untitled)')}${a.title && a.title.length > 60 ? '...' : ''}</a>
            </td>
            <td style="font-size:0.82rem;color:var(--text-muted)">${escHtml(a.source || '—')}</td>
            <td><span class="badge ${a.is_featured ? 'badge-green' : 'badge-gray'}">${a.is_featured ? '★ Featured' : '☆ Default'}</span></td>
            <td>${a.is_hidden ? '<span class="badge badge-red">Hidden</span>' : '<span class="badge badge-green">Visible</span>'}</td>
            <td>
              <button class="btn btn-sm ${a.is_featured ? 'btn-outline' : 'btn-primary'}" onclick="toggleFeatured('${escAttr(a.url)}', ${!a.is_featured})" title="${a.is_featured ? 'Unfeature' : 'Feature'}">${a.is_featured ? '☆' : '★'}</button>
              <button class="btn btn-sm ${a.is_hidden ? 'btn-success' : 'btn-danger'}" onclick="toggleHidden('${escAttr(a.url)}', ${!a.is_hidden})" title="${a.is_hidden ? 'Show' : 'Hide'}">${a.is_hidden ? '👁️' : '🙈'}</button>
              ${a.id ? `<button class="btn btn-sm btn-ghost" onclick="deleteCustomArticle(${a.id})" title="Delete">🗑️</button>` : ''}
            </td>
          </tr>
        `).join('')}
      </table></div>` : `
      <div class="empty-state">
        <div class="empty-icon">📭</div>
        <p>No articles yet. Create your first article or trigger a build to fetch from RSS sources.</p>
      </div>`}
    </div>
  `;
}

async function toggleFeatured(url, featured) {
  const data = await api('POST', '/articles/override', { url: url, is_featured: featured, is_hidden: false });
  if (data) {
    toast(featured ? '⭐ Featured!' : '☆ Unfeatured', 'success');
    loadPage('articles');
  }
}

async function toggleHidden(url, hidden) {
  const data = await api('POST', '/articles/override', { url: url, is_featured: false, is_hidden: hidden });
  if (data) {
    toast(hidden ? '🙈 Article hidden' : '👁️ Article visible', 'success');
    loadPage('articles');
  }
}

async function deleteCustomArticle(id) {
  if (!confirm('Delete this custom article? This cannot be undone.')) return;
  const data = await api('DELETE', `/articles/${id}`);
  if (data) {
    toast('🗑️ Article deleted', 'success');
    loadPage('articles');
  }
}

/* ====== CREATE ARTICLE ====== */
async function loadCreateArticle(el) {
  el.innerHTML = `
    <div class="page-header">
      <div>
        <h1>✏️ Create Article</h1>
        <div class="subtitle">Write and publish a custom news article</div>
      </div>
      <div class="page-actions">
        <button class="btn btn-outline" onclick="navigate('articles')">📝 View All</button>
      </div>
    </div>
    <div class="card create-form">
      <h3>📝 Article Details</h3>
      <div class="form-row">
        <label for="caTitle">Article Title *</label>
        <input type="text" id="caTitle" placeholder="Enter a compelling headline..." maxlength="120">
        <div class="char-count" id="caTitleCount">0 / 120</div>
      </div>
      <div class="form-row">
        <label for="caAuthor">Author Name</label>
        <input type="text" id="caAuthor" placeholder="Author name" value="Rupeewa Team">
      </div>
      <div class="form-row">
        <label for="caContent">Content / Summary</label>
        <textarea id="caContent" rows="4" placeholder="Write article content or summary here..."></textarea>
        <div class="form-hint">At least 20 characters recommended</div>
      </div>
      <div class="form-row">
        <label for="caImage">Image URL (optional)</label>
        <input type="url" id="caImage" placeholder="https://example.com/image.jpg" oninput="previewArticleImage(this.value)">
        <div class="image-preview-container" id="caImagePreviewContainer">
          <img id="caImagePreview" alt="Preview">
        </div>
      </div>
      <div class="form-row inline">
        <input type="checkbox" id="caFeatured" style="width:auto">
        <label for="caFeatured" style="margin-bottom:0;cursor:pointer">⭐ Feature this article on the homepage</label>
      </div>
      <div style="display:flex;gap:0.75rem;margin-top:1.25rem">
        <button class="btn btn-primary" onclick="submitCustomArticle()">📤 Publish Article</button>
        <button class="btn btn-outline" onclick="loadCreateArticle(document.getElementById('pageContent'))">🔄 Reset</button>
      </div>
      <div id="caResult" style="margin-top:1rem"></div>
    </div>
    <div class="card">
      <h3>💡 Publishing Workflow</h3>
      <ol style="color:var(--text-secondary);line-height:1.9;padding-left:1.2rem;font-size:0.9rem">
        <li><strong>Title</strong> — Enter a catchy headline (max 120 chars)</li>
        <li><strong>Author</strong> — Your name or "Rupeewa Team"</li>
        <li><strong>Content</strong> — Write or paste a summary</li>
        <li><strong>Image</strong> — Paste any public image URL (optional)</li>
        <li>Click <strong>"Publish Article"</strong> → saved to repository</li>
        <li>Go to <strong>Build → Trigger Build</strong> to deploy the article to your site!</li>
      </ol>
    </div>
  `;

  document.getElementById('caTitle')?.addEventListener('input', function() {
    document.getElementById('caTitleCount').textContent = this.value.length + ' / 120';
  });
}

function previewArticleImage(url) {
  const container = document.getElementById('caImagePreviewContainer');
  const img = document.getElementById('caImagePreview');
  if (!container || !img) return;
  if (url && (url.startsWith('http://') || url.startsWith('https://'))) {
    img.src = url;
    container.classList.add('show');
  } else {
    container.classList.remove('show');
  }
}

async function submitCustomArticle() {
  const title = document.getElementById('caTitle')?.value.trim();
  const content = document.getElementById('caContent')?.value.trim();
  const image_url = document.getElementById('caImage')?.value.trim();
  const author = document.getElementById('caAuthor')?.value.trim() || 'Rupeewa Team';
  const is_featured = document.getElementById('caFeatured')?.checked || false;
  const resultEl = document.getElementById('caResult');

  if (!title) { resultEl.innerHTML = '<p class="color-danger">❌ Title is required</p>'; return; }
  if (title.length > 120) { resultEl.innerHTML = '<p class="color-danger">❌ Title must be under 120 characters</p>'; return; }

  resultEl.innerHTML = '<p class="color-muted">⏳ Publishing...</p>';
  try {
    const data = await api('POST', '/articles/create', { title, content, image_url, author, is_featured });
    if (data && data.status === 'created') {
      resultEl.innerHTML = '<p class="color-success">✅ Article published! ID: ' + data.id + '. <a href="#" onclick="navigate(\'build\')" style="color:#8b83ff">👉 Go to Build page</a> to deploy.</p>';
      document.getElementById('caTitle').value = '';
      document.getElementById('caContent').value = '';
      document.getElementById('caImage').value = '';
      document.getElementById('caAuthor').value = 'Rupeewa Team';
      document.getElementById('caFeatured').checked = false;
      document.getElementById('caImagePreviewContainer')?.classList.remove('show');
      document.getElementById('caTitleCount').textContent = '0 / 120';
      toast('✅ Article published!', 'success');
    } else {
      resultEl.innerHTML = '<p class="color-danger">❌ ' + (data?.error || 'Failed to publish') + '</p>';
    }
  } catch (e) {
    resultEl.innerHTML = '<p class="color-danger">❌ ' + e.message + '</p>';
  }
}

async function saveSettings() {
  const settings = {
    site_name: document.getElementById('siteName').value,
    site_description: document.getElementById('siteDescription').value,
    site_keywords: document.getElementById('siteKeywords').value,
    og_title: document.getElementById('ogTitle').value,
    og_description: document.getElementById('ogDescription').value,
    twitter_handle: document.getElementById('twitterHandle').value,
    google_analytics_id: document.getElementById('gaId').value,
    custom_head_html: document.getElementById('customHead').value,
  };

  const resultEl = document.getElementById('settingsResult');
  resultEl.innerHTML = '<p class="color-muted">⏳ Saving...</p>';

  const data = await api('POST', '/seo', settings);
  if (data) {
    resultEl.innerHTML = '<p class="color-success">✅ Settings saved successfully!</p>';
    toast('💾 Settings saved!', 'success');
    setTimeout(() => { resultEl.innerHTML = ''; }, 3000);
  } else {
    resultEl.innerHTML = '<p class="color-danger">❌ Failed to save settings</p>';
  }
}

/* ====== BUILD ====== */

      <div>
        <h1>🚀 Build & Deploy</h1>
        <div class="subtitle">Trigger a site rebuild to publish latest articles</div>
      </div>
    </div>
    <div class="stats-grid">
      <div class="stat-card stat-accent-purple">
        <div class="stat-content">
          <div class="label">Articles (current)</div>
          <div class="value">${dashData?.article_count || 0}</div>
        </div>
      </div>
      <div class="stat-card stat-accent-cyan">
        <div class="stat-content">
          <div class="label">Sources</div>
          <div class="value">${dashData?.source_count || 0}</div>
        </div>
      </div>
      <div class="stat-card stat-accent-blue">
        <div class="stat-content">
          <div class="label">Last Build</div>
          <div class="value" style="font-size:0.95rem;background:none;-webkit-text-fill-color:var(--text)">${dashData?.last_build && dashData.last_build !== 'Never' ? new Date(dashData.last_build).toLocaleString() : 'Never'}</div>
        </div>
      </div>
    </div>
    <div class="card build-cta">
      <h3 style="justify-content:center;font-size:1.1rem;margin-bottom:0.5rem">🚀 Ready to Deploy?</h3>
      <p class="subtle" style="margin-bottom:1.5rem">Fetches latest RSS articles, builds index.html, commits & deploys to Vercel</p>
      <button class="btn btn-primary btn-large" id="buildBtn" onclick="triggerBuild()">🚀 Trigger Build + Deploy</button>
      <div id="buildStatus" style="margin-top:1rem"></div>
    </div>
    <div id="buildResult" class="hidden">
      <div class="card">
        <h3>📋 Build Output</h3>
        <pre class="build-output" id="buildOutput"></pre>
      </div>
    </div>
    <hr>
    <div class="card">
      <h3>🔔 Send Push Notification</h3>
      <div class="push-section">
        <input id="pushTitle" value="Rupeewa News" placeholder="Notification title" style="flex:1;min-width:150px">
        <input id="pushMessage" placeholder="Notification message..." style="flex:2;min-width:200px">
        <button class="btn btn-primary" onclick="sendPushNotif()">📨 Send</button>
      </div>
      <div id="pushResult" style="margin-top:0.75rem"></div>
    </div>
    <hr>
    <div class="card">
      <h3>📜 Build History</h3>
      <div id="buildLogs"><div class="loading"><span class="loading-spinner"></span> Loading...</div></div>
    </div>
  `;

  loadBuildLogs();
}

async function loadBuildLogs() {
  const data = await api('GET', '/build/logs', undefined, { silent: true });
  const el = document.getElementById('buildLogs');
  if (!data || !data.logs || !data.logs.length) {
    el.innerHTML = '<p class="color-muted" style="text-align:center;padding:1rem">No builds yet</p>';
    return;
  }
  el.innerHTML = `<div class="table-wrap"><table>
    <tr><th>Time</th><th>Status</th><th>Articles</th><th>Error</th></tr>
    ${data.logs.map(l => `
      <tr>
        <td style="font-size:0.8rem">${l.started ? new Date(l.started).toLocaleString() : '-'}</td>
        <td><span class="badge ${l.status === 'success' ? 'badge-green' : l.status === 'failed' ? 'badge-red' : 'badge-yellow'}">${l.status || 'unknown'}</span></td>
        <td>${l.articles || 0}</td>
        <td style="font-size:0.8rem;color:#fca5a5;max-width:200px;overflow:hidden">${escHtml(l.error || '')}</td>
      </tr>
    `).join('')}
  </table></div>`;
}

async function triggerBuild() {
  const btn = document.getElementById('buildBtn');
  const statusEl = document.getElementById('buildStatus');
  const resultDiv = document.getElementById('buildResult');
  const outputPre = document.getElementById('buildOutput');

  btn.disabled = true;
  btn.textContent = '⏳ Building...';
  statusEl.innerHTML = '<p class="color-muted">⏳ Triggering build...</p>';
  resultDiv.classList.remove('hidden');
  outputPre.textContent = 'Building...\n';

  const data = await api('POST', '/build', {}, { silent: true });

  if (data) {
    outputPre.textContent = data.message || data.output || 'Build triggered successfully.';
    if (data.hook_status) outputPre.textContent += `\nHook status: ${data.hook_status}`;
    if (data.error) outputPre.textContent += '\n\nError:\n' + data.error;
    if (data.status === 'triggered') {
      statusEl.innerHTML = '<p class="color-success">✅ Build triggered! Check build history for status.</p>';
      toast('🚀 Build triggered successfully!', 'success');
    } else {
      statusEl.innerHTML = '<p class="color-muted">⚠️ ' + escHtml((data.message || 'Build noted') + '. ' + (data.note || '')) + '</p>';
      toast('⚙️ Build noted', 'info');
    }
    loadBuildLogs();
  } else {
    outputPre.textContent = 'Build failed to start — check connection.';
    statusEl.innerHTML = '<p class="color-danger">❌ Failed to trigger build</p>';
    toast('❌ Build trigger failed', 'error');
  }

  btn.disabled = false;
  btn.textContent = '🚀 Trigger Build + Deploy';
}

/* ====== PUSH NOTIFICATION ====== */
async function sendPushNotif() {
  const title = document.getElementById('pushTitle')?.value || 'Rupeewa News';
  const message = document.getElementById('pushMessage')?.value;
  const resultEl = document.getElementById('pushResult');

  if (!message) { resultEl.innerHTML = '<span class="color-danger">⚠️ Please enter a message</span>'; return; }

  const btns = document.querySelectorAll('[onclick="sendPushNotif()"]');
  btns.forEach(b => { b.disabled = true; b.textContent = '⏳ Sending...'; });

  try {
    const result = await api('POST', '/push/send', { title, message });
    if (result?.status === 'ok') {
      resultEl.innerHTML = `<span class="color-success">✅ Sent to ${result.sent}/${result.total} subscribers${result.errors ? ' (' + result.errors.length + ' errors)' : ''}</span>`;
      toast('📨 Push notification sent!', 'success');
      document.getElementById('pushMessage').value = '';
    } else {
      resultEl.innerHTML = `<span class="color-danger">❌ ${result?.error || 'Failed to send'}</span>`;
    }
  } catch (e) {
    resultEl.innerHTML = `<span class="color-danger">❌ ${e.message}</span>`;
  } finally {
    btns.forEach(b => { b.disabled = false; b.textContent = '📨 Send'; });
  }
}

/* ====== INIT ====== */
(async function init() {
  if (token) {
    // Verify token is still valid
    try {
      const res = await fetch('/api/login', {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const data = await res.json();
      if (data && data.authenticated) {
        username = data.username || username;
        sessionStorage.setItem('admin_user', username);
        document.getElementById('userBadge').textContent = username;
        showApp();
        navigate('dashboard');
        return;
      }
    } catch (e) {
      // fall through to show login
    }
    // Token invalid
    token = '';
    sessionStorage.removeItem('admin_token');
    sessionStorage.removeItem('admin_user');
  }

  showLogin();

  // Enter key handlers for login
  document.getElementById('loginUser').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('loginPass').focus();
  });
  document.getElementById('loginPass').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });
})();
</script>
