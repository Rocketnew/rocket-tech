<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rupeewa Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0f0f13;
            color: #e1e1e8;
            min-height: 100vh;
        }
        a { color: #6c63ff; text-decoration: none; }
        a:hover { color: #8b83ff; }

        /* Login */
        .login-page {
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; padding: 2rem;
        }
        .login-box {
            background: #1a1a24; border-radius: 16px;
            padding: 3rem; width: 100%; max-width: 400px;
            border: 1px solid #2a2a3a;
        }
        .login-box h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .login-box p { color: #888; margin-bottom: 2rem; font-size: 0.9rem; }
        .login-box input {
            width: 100%; padding: 0.85rem 1rem;
            background: #12121a; border: 1px solid #2a2a3a;
            border-radius: 10px; color: #e1e1e8; font-size: 0.95rem;
            margin-bottom: 1rem; outline: none;
        }
        .login-box input:focus { border-color: #6c63ff; }
        .login-box button {
            width: 100%; padding: 0.85rem;
            background: linear-gradient(135deg, #6c63ff, #8b5cf6);
            border: none; border-radius: 10px; color: #fff;
            font-size: 1rem; font-weight: 600; cursor: pointer;
        }
        .login-box button:hover { opacity: 0.9; }
        .login-error { color: #ff6b6b; font-size: 0.85rem; margin-top: 0.5rem; }

        /* Layout */
        .app-container { display: flex; min-height: 100vh; }
        .sidebar {
            width: 240px; background: #14141e; border-right: 1px solid #2a2a3a;
            padding: 1.5rem; flex-shrink: 0;
        }
        .sidebar h2 { font-size: 1rem; color: #fff; margin-bottom: 1.5rem; }
        .sidebar h2 span { color: #6c63ff; }
        .sidebar nav { display: flex; flex-direction: column; gap: 0.25rem; }
        .sidebar nav a {
            padding: 0.7rem 0.9rem; border-radius: 8px; color: #888;
            font-size: 0.9rem; transition: all 0.15s;
        }
        .sidebar nav a:hover, .sidebar nav a.active {
            background: #1e1e2e; color: #e1e1e8;
        }
        .sidebar nav a.active { color: #6c63ff; font-weight: 600; }
        .sidebar .logout-btn {
            margin-top: auto; padding: 0.7rem 0.9rem; border-radius: 8px;
            color: #666; font-size: 0.85rem; cursor: pointer; border: none;
            background: none; text-align: left; width: 100%;
        }
        .sidebar .logout-btn:hover { color: #ff6b6b; background: #1e1e2e; }
        .sidebar .user-badge {
            padding: 0.7rem 0; margin-top: 2rem;
            border-top: 1px solid #2a2a3a; font-size: 0.8rem; color: #666;
        }
        .main-content { flex: 1; padding: 2rem; overflow-y: auto; }
        .main-content h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
        .main-content .subtitle { color: #888; font-size: 0.9rem; margin-bottom: 2rem; }

        /* Cards & Stats - Premium Dashboard */
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1rem; margin-bottom: 2rem;
        }
        .stat-card {
            position: relative; overflow: hidden;
            background: #1a1a24; border-radius: 14px; padding: 1.4rem 1.5rem;
            border: 1px solid #2a2a3a;
            transition: transform 0.25s cubic-bezier(.4,0,.2,1), box-shadow 0.25s ease;
        }
        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(108, 99, 255, 0.12);
        }
        .stat-card .stat-icon {
            font-size: 1.8rem; margin-bottom: 0.6rem; display: inline-block;
        }
        .stat-card .stat-content { position: relative; z-index: 1; }
        .stat-card .label { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-card .value { font-size: 1.8rem; font-weight: 700; margin-top: 0.15rem;
            background: linear-gradient(135deg, #e1e1e8, #a5a5b8); -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; background-clip: text; }
        /* Per-card accent glow */
        .stat-card::after {
            content: ''; position: absolute; top: -50%; right: -50%;
            width: 100%; height: 100%; border-radius: 50%;
            opacity: 0.04; pointer-events: none; transition: opacity 0.3s;
        }
        .stat-card:hover::after { opacity: 0.08; }
        .stat-accent-purple::after { background: radial-gradient(circle, #6c63ff, transparent); }
        .stat-accent-green::after { background: radial-gradient(circle, #059669, transparent); }
        .stat-accent-blue::after { background: radial-gradient(circle, #3b82f6, transparent); }
        .stat-accent-amber::after { background: radial-gradient(circle, #f59e0b, transparent); }
        .stat-accent-rose::after { background: radial-gradient(circle, #ec4899, transparent); }
        .stat-accent-cyan::after { background: radial-gradient(circle, #06b6d4, transparent); }
        .stat-card .stat-trend {
            font-size: 0.75rem; margin-top: 0.4rem; display: flex; align-items: center; gap: 0.3rem;
        }
        .stat-trend.up { color: #6ee7b7; }
        .stat-trend.down { color: #fca5a5; }
        .stat-trend.neutral { color: #888; }

        .dash-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 1.5rem; flex-wrap: wrap; gap: 0.5rem;
        }
        .dash-header h1 { font-size: 1.6rem; margin-bottom: 0; }
        .dash-header .dash-greeting { font-size: 0.85rem; color: #888; }
        .dash-actions { display: flex; gap: 0.6rem; flex-wrap: wrap; }

        .card {
            background: linear-gradient(135deg, #1a1a24 0%, #1e1e2e 100%);
            border-radius: 14px; border: 1px solid #2a2a3a;
            padding: 1.5rem; margin-bottom: 1rem;
            transition: box-shadow 0.2s;
        }
        .card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
        .card h3 { font-size: 1.05rem; margin-bottom: 1rem; color: #e1e1e8; display: flex; align-items: center; gap: 0.4rem; }

        /* Tables */
        .table-wrap { overflow-x: auto; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th { text-align: left; padding: 0.75rem 0.6rem; color: #888;
             font-weight: 500; border-bottom: 1px solid #2a2a3a; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.3px; }
        td { padding: 0.75rem 0.6rem; border-bottom: 1px solid #1e1e2e; transition: background 0.15s; }
        tr:hover td { background: rgba(108,99,255,0.03); }

        /* Forms */
        input, select, textarea {
            width: 100%; padding: 0.7rem 0.9rem;
            background: #12121a; border: 1px solid #2a2a3a;
            border-radius: 10px; color: #e1e1e8; font-size: 0.9rem;
            margin-bottom: 0.75rem; outline: none; font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus, select:focus, textarea:focus { border-color: #6c63ff; box-shadow: 0 0 0 3px rgba(108,99,255,0.1); }
        textarea { min-height: 80px; resize: vertical; }
        label { display: block; font-size: 0.85rem; color: #aaa; margin-bottom: 0.3rem; font-weight: 500; }
        .form-row { margin-bottom: 0.75rem; }

        /* Buttons */
        .btn {
            padding: 0.6rem 1.2rem; border-radius: 10px; border: none;
            font-size: 0.85rem; font-weight: 600; cursor: pointer;
            transition: all 0.2s cubic-bezier(.4,0,.2,1);
            display: inline-flex; align-items: center; gap: 0.4rem;
        }
        .btn-primary { background: linear-gradient(135deg, #6c63ff, #8b5cf6); color: #fff; box-shadow: 0 2px 10px rgba(108,99,255,0.2); }
        .btn-primary:hover { opacity: 0.95; box-shadow: 0 4px 16px rgba(108,99,255,0.3); transform: translateY(-1px); }
        .btn-danger { background: #dc2626; color: #fff; }
        .btn-danger:hover { background: #b91c1c; transform: translateY(-1px); }
        .btn-sm { padding: 0.4rem 0.8rem; font-size: 0.8rem; }
        .btn-outline { background: transparent; border: 1px solid #2a2a3a; color: #ccc; }
        .btn-outline:hover { border-color: #6c63ff; color: #fff; background: rgba(108,99,255,0.05); }
        .btn-success { background: #059669; color: #fff; }
        .btn-success:hover { background: #047857; transform: translateY(-1px); }

                .image-preview { max-width: 100%; max-height: 160px; border-radius: 8px; margin-top: 0.5rem; display: none; }
        .image-preview.show { display: block; }
        .char-count { font-size: 0.75rem; color: #666; text-align: right; }
        .create-form { max-width: 600px; }
        .form-hint { font-size: 0.78rem; color: #666; margin-top: -0.5rem; margin-bottom: 0.75rem; }
        .image-preview { max-width: 100%; max-height: 160px; border-radius: 8px; margin-top: 0.5rem; display: none; }
        .image-preview.show { display: block; }
        .char-count { font-size: 0.75rem; color: #666; text-align: right; }
        .create-form { max-width: 600px; }
        .form-hint { font-size: 0.78rem; color: #666; margin-top: -0.5rem; margin-bottom: 0.75rem; }
        .badge {
            padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.7rem; font-weight: 600;
        }
        .badge-green { background: #065f46; color: #6ee7b7; }
        .badge-red { background: #7f1d1d; color: #fca5a5; }
        .badge-yellow { background: #713f12; color: #fcd34d; }
        .badge-blue { background: #1e3a5f; color: #93c5fd; }

        .flex { display: flex; gap: 0.75rem; align-items: center; }
        .flex-wrap { flex-wrap: wrap; }
        .mt-1 { margin-top: 1rem; }
        .mb-1 { margin-bottom: 1rem; }
        .gap-1 { gap: 0.5rem; }
        .text-center { text-align: center; }
        .color-success { color: #6ee7b7; }
        .color-danger { color: #fca5a5; }

        .loading { text-align: center; padding: 3rem; color: #666; }

        .hidden { display: none !important; }
        .tab-bar { display: flex; gap: 0.25rem; margin-bottom: 1.5rem; }
        .tab-bar button {
            padding: 0.5rem 1rem; border-radius: 6px; border: none;
            background: none; color: #888; font-size: 0.85rem; cursor: pointer;
        }
        .tab-bar button.active { background: #1e1e2e; color: #fff; }
        .tab-bar button:hover { color: #e1e1e8; }

        .toast {
            position: fixed; bottom: 2rem; right: 2rem;
            background: #1a1a24; border: 1px solid #2a2a3a; border-radius: 10px;
            padding: 1rem 1.5rem; color: #e1e1e8; font-size: 0.9rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4); z-index: 1000;
            display: none;
        }
        .toast.show { display: block; animation: slideIn 0.3s; }
        @keyframes slideIn { from { transform: translateY(1rem); opacity: 0; } }

        @media (max-width: 768px) {
            .sidebar { width: 100%; border-right: none; border-bottom: 1px solid #2a2a3a; }
            .app-container { flex-direction: column; }
        }
    </style>
</head>
<body>
<div id="app">
    <!-- Login -->
    <div id="loginPage" class="login-page">
        <div class="login-box">
            <h1>🔐 Rupeewa Admin</h1>
            <p>Sign in to manage your site</p>
            <input type="text" id="loginUser" placeholder="Username" autocomplete="username">
            <input type="password" id="loginPass" placeholder="Password" autocomplete="current-password">
            <button onclick="login()">Sign In</button>
            <div id="loginError" class="login-error"></div>
        </div>
    </div>

    <!-- App -->
    <div id="appContainer" class="app-container hidden">
        <!-- Sidebar -->
        <div class="sidebar" style="display:flex;flex-direction:column;">
            <h2><span>◆</span> Rupeewa</h2>
            <nav>
                <a href="#" data-page="dashboard" class="active" onclick="navigate('dashboard')">📊 Dashboard</a>
                <a href="#" data-page="articles" onclick="navigate('articles')">📝 Articles</a>
                <a href="#" data-page="createarticle" onclick="navigate('createarticle')">✏️ Create Article</a>
                <a href="#" data-page="sources" onclick="navigate('sources')">📡 Sources</a>
                <a href="#" data-page="seo" onclick="navigate('seo')">🔍 SEO Settings</a>
                <a href="#" data-page="build" onclick="navigate('build')">🚀 Build</a>
                <a href="#" data-page="subscribers" onclick="navigate('subscribers')">📧 Subscribers</a>
                <a href="#" data-page="images" onclick="navigate('images')">🖼️ Images</a>
            </nav>
            <div class="user-badge" id="userBadge">admin</div>
            <button class="logout-btn" onclick="logout()">🚪 Sign Out</button>
        </div>

        <!-- Main -->
        <div class="main-content">
            <div id="pageContent"></div>
        </div>
    </div>
</div>
<div id="toast" class="toast"></div>

<script>
let API = '';
let token = localStorage.getItem('token') || '';
let currentPage = 'dashboard';

async function api(method, path, body) {
    const opts = { method, headers: { 'X-Requested-With': 'XMLHttpRequest' } };
    if (token) opts.headers['Authorization'] = `Bearer ${token}`;
    if (body instanceof FormData) {
        opts.body = body;
    } else if (body) {
        opts.headers['Content-Type'] = 'application/json';
        opts.body = JSON.stringify(body);
    }
    const res = await fetch('/api' + path, opts);
    if (res.status === 401) { token = ''; localStorage.removeItem('token'); showLogin(); return null; }
    const data = await res.json();
    if (!res.ok) { toast(data.detail || data.error || 'Error'); return null; }
    return data;
}

// ─── XSS SANITIZATION ────────────────────────────────────────────────
function escapeHtml(str) {
    if (!str) return '';
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

function escapeAttr(str) {
    if (!str) return '';
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
}

function escapeUrl(str) {
    if (!str) return '';
    return str.replace(/'/g, '%27').replace(/"/g, '%22').replace(/</g, '%3C').replace(/>/g, '%3E');
}
// ─────────────────────────────────────────────────────────────────────

function showLogin() {
    document.getElementById('loginPage').classList.remove('hidden');
    document.getElementById('appContainer').classList.add('hidden');
}

function showApp() {
    document.getElementById('loginPage').classList.add('hidden');
    document.getElementById('appContainer').classList.remove('hidden');
}

async function login() {
    const user = document.getElementById('loginUser').value;
    const pass = document.getElementById('loginPass').value;
    const data = await api('POST', '/login', { username: user, password: pass });
    if (data && data.access_token) {
        token = data.access_token;
        localStorage.setItem('token', token);
        document.getElementById('userBadge').textContent = data.username || user;
        showApp();
        navigate('dashboard');
    } else {
        document.getElementById('loginError').textContent = 'Invalid credentials';
    }
}

function logout() {
    token = '';
    localStorage.removeItem('token');
    showLogin();
}

function navigate(page) {
    currentPage = page;
    document.querySelectorAll('.sidebar nav a').forEach(a => {
        a.classList.toggle('active', a.dataset.page === page);
    });
    loadPage(page);
}

function loadPage(page) {
    const el = document.getElementById('pageContent');
    el.innerHTML = '<div class="loading">Loading...</div>';
    if (page === 'dashboard') loadDashboard(el);
    else if (page === 'articles') loadArticles(el);
    else if (page === 'createarticle') loadCreateArticle(el);
    else if (page === 'sources') loadSources(el);
    else if (page === 'seo') loadSeo(el);
    else if (page === 'build') loadBuild(el);
    else if (page === 'subscribers') loadSubscribers(el);
    else if (page === 'images') loadImages(el);
}

// ─── CREATE CUSTOM ARTICLE ──────────────────────────────────────────

async function loadCreateArticle(el) {
    const now = new Date();
    el.innerHTML = `
        <div class="dash-header">
            <div>
                <h1>✏️ Create Article</h1>
                <div class="dash-greeting">Create a custom article with text and image</div>
            </div>
        </div>
        <div class="card create-form">
            <h3>📝 Article Details</h3>
            <div class="form-row">
                <label for="caTitle">Article Title *</label>
                <input type="text" id="caTitle" placeholder="Enter a compelling headline..." />
                <div class="char-count" id="caTitleCount">0 / 120</div>
            </div>
            <div class="form-row">
                <label for="caImage">Image</label>
                <div style="display:flex;flex-direction:column;gap:8px">
                    <div style="display:flex;gap:8px;align-items:center">
                        <input type="file" id="caImageFile" accept="image/*" style="flex:1;padding:8px;background:#12121a;border:1px dashed #333;border-radius:8px;color:#aaa" />
                        <button class="btn btn-outline" onclick="uploadImageFile()" style="white-space:nowrap">📤 Upload</button>
                    </div>
                    <div style="display:flex;gap:8px;align-items:center;color:#666;font-size:0.85rem">
                        <span>— or paste URL —</span>
                        <input type="url" id="caImage" placeholder="https://..." style="flex:1" oninput="previewImage(this.value)" />
                    </div>
                    <img id="caImagePreview" class="image-preview" alt="Preview" style="display:none" />
                    <div id="caImageStatus" class="form-hint" style="color:#888"></div>
                </div>
            </div>
            <div class="form-row">
                <label for="caContent">Content / Summary</label>
                <textarea id="caContent" rows="4" placeholder="Write article content or summary here..."></textarea>
                <div class="form-hint">At least 20 characters recommended</div>
            </div>
            <div class="form-row">
                <label for="caAuthor">Author Name</label>
                <input type="text" id="caAuthor" placeholder="Your name" value="Rupeewa Team" />
            </div>
            <div class="form-row" style="display:flex;gap:1rem;align-items:center">
                <label style="margin:0;display:flex;align-items:center;gap:0.5rem;cursor:pointer">
                    <input type="checkbox" id="caFeatured" style="width:auto" /> ⭐ Feature this article
                </label>
            </div>
            <div style="display:flex;gap:0.75rem;margin-top:1rem">
                <button class="btn btn-primary" onclick="submitCustomArticle()">📤 Publish Article</button>
                <button class="btn btn-outline" onclick="loadCreateArticle(document.getElementById('pageContent'))">🔄 Clear Form</button>
            </div>
            <div id="caResult" style="margin-top:1rem"></div>
        </div>
        <div class="card">
            <h3>💡 How it works</h3>
            <ol style="color:#aaa;line-height:1.8;padding-left:1.2rem">
                <li><strong>Title</strong> — Enter a catchy headline</li>
                <li><strong>Image</strong> — Paste any public image URL</li>
                <li><strong>Content</strong> — Write or paste article content</li>
                <li><strong>Author</strong> — Your name (optional)</li>
                <li>Click <strong>"Publish Article"</strong> → saved to GitHub</li>
                <li>Go to <strong>Build</strong> page → <strong>Trigger Build</strong> → article appears on website!</li>
            </ol>
        </div>
    `;
    document.getElementById('caTitle')?.addEventListener('input', function() {
        document.getElementById('caTitleCount').textContent = this.value.length + ' / 120';
    });
}

// Image upload handler
async function uploadImageFile() {
    const fileInput = document.getElementById('caImageFile');
    const statusEl = document.getElementById('caImageStatus');
    if (!fileInput || !fileInput.files || !fileInput.files[0]) {
        statusEl.textContent = '⚠️ Please select an image file first';
        return;
    }
    const file = fileInput.files[0];
    if (file.size > 5 * 1024 * 1024) {
        statusEl.textContent = '⚠️ Image too large (max 5MB)';
        return;
    }
    statusEl.textContent = '⏳ Uploading...';
    try {
        // Read file as base64
        const reader = new FileReader();
        reader.onload = async function(e) {
            const base64Data = e.target.result.split(',')[1];
            const res = await api('POST', '/upload', {
                filename: file.name,
                data: base64Data
            });
            if (res && res.url) {
                document.getElementById('caImage').value = res.url;
                previewImage(res.url);
                statusEl.textContent = '✅ Image uploaded! URL pasted above.';
            } else {
                statusEl.textContent = '❌ Upload failed: ' + (res?.error || 'Unknown error');
            }
        };
        reader.onerror = function() {
            statusEl.textContent = '❌ Failed to read file';
        };
        reader.readAsDataURL(file);
    } catch (e) {
        statusEl.textContent = '❌ ' + e.message;
    }
}

// Image preview
function previewImage(url) {
    const img = document.getElementById('caImagePreview');
    if (!img) return;
    if (url && (url.startsWith('http://') || url.startsWith('https://'))) {
        img.src = url;
        img.classList.add('show');
    } else {
        img.classList.remove('show');
    }
}

// Submit custom article
async function submitCustomArticle() {
    const title = document.getElementById('caTitle')?.value.trim();
    const content = document.getElementById('caContent')?.value.trim();
    const image_url = document.getElementById('caImage')?.value.trim();
    const author = document.getElementById('caAuthor')?.value.trim() || 'Rupeewa Team';
    const is_featured = document.getElementById('caFeatured')?.checked || false;
    const resultEl = document.getElementById('caResult');

    if (!title) { resultEl.innerHTML = '<p class="color-danger">❌ Title is required</p>'; return; }
    if (title.length > 120) { resultEl.innerHTML = '<p class="color-danger">❌ Title must be under 120 characters</p>'; return; }

    resultEl.innerHTML = '<p style="color:#888">⏳ Publishing...</p>';
    try {
        const data = await api('POST', '/articles/create', { title, content, image_url, author, is_featured });
        if (data && data.status === 'created') {
            resultEl.innerHTML = '<p class="color-success">✅ Article published! ID: ' + data.id + '. <a href="#" onclick="navigate(\'build\')" style="color:#6c63ff">👉 Go to Build page</a> to deploy.</p>';
            // Clear form
            document.getElementById('caTitle').value = '';
            document.getElementById('caContent').value = '';
            document.getElementById('caImage').value = '';
            document.getElementById('caFeatured').checked = false;
            document.getElementById('caImagePreview')?.classList.remove('show');
        } else {
            resultEl.innerHTML = '<p class="color-danger">❌ ' + (data?.error || 'Failed to publish') + '</p>';
        }
    } catch (e) {
        resultEl.innerHTML = '<p class="color-danger">❌ ' + e.message + '</p>';
    }
}

async function toggleHidden(url, hidden) {

async function addSource() {
    const name = document.getElementById('srcName').value;
    const url = document.getElementById('srcUrl').value;
    const limit = document.getElementById('srcLimit').value;
    if (!name || !url) { toast('Name and URL required'); return; }
    const data = await api('POST', '/sources/add', { name: name, rss_url: url, article_limit: limit });
    if (data) { toast(`✅ ${name} added!`); document.getElementById('srcName').value = ''; document.getElementById('srcUrl').value = ''; loadPage('sources'); }
}

async function deleteSource(id) {
    if (!confirm('Delete this source?')) return;
    const data = await api('DELETE', `/sources/${id}`);
    if (data) { toast('🗑️ Deleted'); loadPage('sources'); }
}

async function deleteCustomArticle(url, id) {
    if (!confirm('Delete this custom article?')) return;
    const data = await api('DELETE', `/articles/${id}`);
    if (data) { toast('🗑️ Article deleted'); loadPage('articles'); }
}

async function loadImages(el) {
    const data = await api('GET', '/images');
    if (!data) { el.innerHTML = '<p>Failed to load images</p>'; return; }

    el.innerHTML = `
        <h1>🖼️ Uploaded Images</h1>
        <p class="subtitle">${data.total} images in admin/images/</p>
        <div class="card">
            <h3>Upload New Image</h3>
            <div style="display:grid;grid-template-columns:1fr 100px;gap:0.5rem;margin-bottom:1rem;">
                <input type="file" id="imgUpload" accept="image/*" style="padding:0.5rem;">
                <button class="btn btn-primary" onclick="uploadImage()">Upload</button>
            </div>
        </div>
        ${data.images.length ? `
        <div class="card">
            <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:1rem;">
                ${data.images.map(img => `
                    <div style="border:1px solid #333;border-radius:8px;padding:0.5rem;text-align:center;">
                        <img src="${img.url}" alt="${escapeHtml(img.name)}" style="max-width:100%;height:auto;border-radius:4px;margin-bottom:0.5rem;">
                        <div style="font-size:0.75rem;color:#888;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escapeHtml(img.name)}</div>
                        <div style="font-size:0.7rem;color:#666;">${(img.size/1024).toFixed(1)} KB</div>
                        <button class="btn btn-sm btn-danger" style="margin-top:0.5rem;width:100%;" onclick="deleteImage('${escapeAttr(img.name)}', '${escapeAttr(img.sha)}')">🗑️ Delete</button>
                    </div>
                `).join('')}
            </div>
        </div>` : '<div class="card"><p style="color:#666">No images uploaded yet</p></div>'}
    `;
}

async function uploadImage() {
    const fileInput = document.getElementById('imgUpload');
    if (!fileInput.files.length) { toast('Select an image first'); return; }
    const file = fileInput.files[0];
    const reader = new FileReader();
    reader.onload = async () => {
        const base64 = reader.result.split(',')[1];
        const data = await api('POST', '/upload', { filename: file.name, data: base64 });
        if (data) { toast('✅ Uploaded: ' + data.url); fileInput.value = ''; loadPage('images'); }
    };
    reader.readAsDataURL(file);
}

async function deleteImage(name, sha) {
    if (!confirm('Delete this image?')) return;
    const data = await api('DELETE', `/uploads/${encodeURIComponent(name)}`);
    if (data) { toast('🗑️ Deleted'); loadPage('images'); }
}

async function loadBuildLogs() {

async function triggerBuild() {
    const resultDiv = document.getElementById('buildResult');
    const outputPre = document.getElementById('buildOutput');
    resultDiv.classList.remove('hidden');
    outputPre.textContent = 'Building...';
    
    const data = await api('POST', '/build/trigger');
    if (data) {
        outputPre.textContent = data.output || 'Build completed';
        if (data.error) outputPre.textContent += '\n\nErrors:\n' + data.error;
        toast(data.status === 'success' ? '✅ Build successful!' : '❌ Build failed');
        loadBuildLogs();
    } else {

}

function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 3000);
}

// ─── SEND PUSH NOTIFICATION ────────────────────────────────────────

async function sendPushNotif() {
    const title = document.getElementById('pushTitle')?.value || 'Rupeewa News';
    const message = document.getElementById('pushMessage')?.value;
    if (!message) { toast('⚠️ Please enter a message'); return; }
    const btn = document.querySelector('[onclick="sendPushNotif()"]');
    if (btn) { btn.disabled = true; btn.textContent = '⏳ Sending...'; }
    try {
        const result = await api('POST', '/push/send', { title, message });
        const el = document.getElementById('pushResult');
        if (result?.status === 'ok') {
            el.innerHTML = `<span style="color:#4ade80">✅ Sent to ${result.sent}/${result.total} subscribers${result.errors ? ' (' + result.errors.length + ' errors)' : ''}</span>`;
        } else {
            el.innerHTML = `<span style="color:#fca5a5">❌ ${result?.error || 'Failed'}</span>`;
        }
        if (btn) { btn.disabled = false; btn.textContent = '📨 Send'; }
    } catch(e) {
        document.getElementById('pushResult').innerHTML = `<span style="color:#fca5a5">❌ ${e.message}</span>`;
        if (btn) { btn.disabled = false; btn.textContent = '📨 Send'; }
    }
}

}
