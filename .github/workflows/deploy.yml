name: Build + Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Build Script
        run: python3 build.py

      - name: Commit build output
        run: |
          git config user.name "rupeewa-bot"
          git config user.email "bot@rupeewa.vercel.app"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-build index.html [skip ci]"
            git pull --rebase
            git push
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Deploy to Vercel
        env:
          VERCEL_ORG_ID: team_nH74DsGJuHIdmakgZap16v9s
          VERCEL_PROJECT_ID: prj_qC5CHqTqH6nAtpEzOBNE9GeGs19S
        run: npx vercel deploy --prod --yes --token="${{ secrets.VERCEL_TOKEN }}"
