<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100">
  <defs>
    <linearGradient id="rg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="rg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="rg3" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#ff8c42"/>
    </linearGradient>
  </defs>
  <!-- Rocket Body -->
  <g transform="translate(10, 25)">
    <!-- Flames -->
    <path d="M30,52 Q25,62 20,70 Q30,65 35,58 Q40,65 50,70 Q45,62 40,52Z" fill="url(#rg3)" opacity="0.9">
      <animate attributeName="d" values="M30,52 Q25,62 20,70 Q30,65 35,58 Q40,65 50,70 Q45,62 40,52Z;M30,52 Q23,64 18,72 Q28,66 35,58 Q42,66 52,72 Q47,64 40,52Z;M30,52 Q25,62 20,70 Q30,65 35,58 Q40,65 50,70 Q45,62 40,52Z" dur="0.4s" repeatCount="indefinite"/>
    </path>
    <!-- Main body -->
    <path d="M15,40 Q15,25 30,10 Q45,25 45,40 L42,52 L18,52Z" fill="url(#rg2)"/>
    <!-- Window -->
    <circle cx="30" cy="30" r="6" fill="#0a0a0f" stroke="#fff" stroke-width="1.5" opacity="0.9"/>
    <!-- Nose cone highlight -->
    <path d="M30,10 Q35,20 35,28" stroke="rgba(255,255,255,0.3)" stroke-width="2" fill="none"/>
    <!-- Wing left -->
    <path d="M15,40 L5,52 L18,52Z" fill="#4f46e5" opacity="0.8"/>
    <!-- Wing right -->
    <path d="M45,40 L55,52 L42,52Z" fill="#4f46e5" opacity="0.8"/>
    <!-- Decorative stripe -->
    <rect x="18" y="44" rx="1" width="24" height="3" fill="#a78bfa" opacity="0.6"/>
  </g>
  <!-- Brand Name -->
  <text x="80" y="55" font-family="'Inter',-apple-system,sans-serif" font-size="28" font-weight="800" fill="#fff">Rocket</text>
  <text x="80" y="82" font-family="'Inter',-apple-system,sans-serif" font-size="18" font-weight="500" fill="url(#rg)" letter-spacing="6">NEWS DAILY</text>
  <!-- Separator line -->
  <rect x="80" y="64" width="280" height="1" fill="url(#rg)" opacity="0.3"/>
  <!-- Badge -->
  <rect x="310" y="42" rx="4" width="70" height="22" fill="#7c3aed" opacity="0.9"/>
  <text x="315" y="57" font-family="'Inter',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#fff" letter-spacing="1">TECH</text>
</svg>
